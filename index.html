<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Verimlilik Paneli</title>
    <link rel="stylesheet" href="style.css">
    <!-- SF Pro benzeri font ve Apple ikon hissiyatı için -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sol Menü / Sidebar -->
        <aside class="sidebar">
            <div class="profile-section">
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
                <h2>Verimlilik Paneli</h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" onclick="switchTab('tasks')">
                    <i class="fa-solid fa-check-square"></i> Görevler
                </button>
                <button class="nav-btn" onclick="switchTab('calendar')">
                    <i class="fa-solid fa-calendar-days"></i> Takvim
                </button>
                <button class="nav-btn" onclick="switchTab('notes')">
                    <i class="fa-solid fa-note-sticky"></i> Toplantı Notları
                </button>
            </nav>
        </aside>

        <!-- Ana İçerik Alanı -->
        <main class="main-content">
            
            <!-- GÖREVLER SEKMESİ -->
            <section id="tasks" class="tab-content active">
                <header class="section-header">
                    <h1>Görevler</h1>
                    <span class="date-badge" id="current-date"></span>
                </header>

                <div class="card add-card">
                    <input type="text" id="task-input" placeholder="Yeni bir görev ekleyin...">
                    <button class="apple-btn" onclick="addTask()">Ekle</button>
                </div>

                <ul id="task-list" class="apple-list">
                    <!-- Görevler JS ile buraya yüklenecek -->
                </ul>
            </section>

            <!-- TAKVİM SEKMESİ -->
            <section id="calendar" class="tab-content">
                <header class="section-header">
                    <h1>Takvim & Etkinlikler</h1>
                </header>
                <div class="card">
                    <div class="calendar-header">
                        <h3 id="calendar-month-year"></h3>
                    </div>
                    <div class="calendar-grid" id="calendar-grid">
                        <!-- Takvim günleri JS ile oluşturulacak -->
                    </div>
                </div>
            </section>

            <!-- TOPLANTI NOTLARI SEKMESİ -->
            <section id="notes" class="tab-content">
                <header class="section-header">
                    <h1>Toplantı Notları</h1>
                </header>
                
                <div class="card add-card flex-col">
                    <input type="text" id="note-title" placeholder="Toplantı Başlığı">
                    <textarea id="note-body" placeholder="Notlarınızı buraya yazın..." rows="4"></textarea>
                    
                    <!-- Dosya / Fotoğraf Yükleme Alanı -->
                    <div class="file-upload-wrapper">
                        <label for="note-file" class="file-label">
                            <i class="fa-solid fa-paperclip"></i> Fotoğraf veya Ek Ekle
                        </label>
                        <input type="file" id="note-file" accept="image/*,application/pdf" multiple onchange="handleFileSelect(event)">
                        <span id="file-name-display">Dosya seçilmedi</span>
                    </div>

                    <button class="apple-btn align-self-end" onclick="addNote()">Notu Kaydet</button>
                </div>

                <div id="notes-list" class="notes-grid">
                    <!-- Notlar JS ile buraya eklenecek -->
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
