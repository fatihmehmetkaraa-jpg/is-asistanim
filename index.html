<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İş Asistanım</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans antialiased min-h-screen">
  <div id="root"></div>

  <script>
    const e = React.createElement;
    const { useState, useEffect, useRef } = React;

    function App() {
      const [darkMode, setDarkMode] = useState(false);
      const [activeTab, setActiveTab] = useState("daily");
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split("T")[0]);

      const fileInputRef = useRef(null);
      const importInputRef = useRef(null);
      const [selectedImage, setSelectedImage] = useState(null);

      const [tasks, setTasks] = useState([]);
      const [meetingTopics, setMeetingTopics] = useState([]);

      const [showAddForm, setShowAddForm] = useState(false);
      const [newTaskTitle, setNewTaskTitle] = useState("");
      const [newTaskPriority, setNewTaskPriority] = useState("Orta");
      const [newTaskCategory, setNewTaskCategory] = useState("Üretim");

      const [editingTaskId, setEditingTaskId] = useState(null);
      const [editTitle, setEditTitle] = useState("");
      const [editPriority, setEditPriority] = useState("Orta");
      const [editCategory, setEditCategory] = useState("Üretim");

      const [newTopicTitle, setNewTopicTitle] = useState("");
      const [selectedTopicId, setSelectedTopicId] = useState(null);
      const [newNoteContent, setNewNoteContent] = useState("");

      const [searchQuery, setSearchQuery] = useState("");
      const [isListening, setIsListening] = useState(false);

      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      useEffect(() => {
        const today = new Date().toISOString().split("T")[0];
        try {
          const savedTasks = localStorage.getItem("my_workspace_tasks_v8");
          if (savedTasks) {
            setTasks(JSON.parse(savedTasks));
          } else {
            setTasks([
              { id: "1", title: "Kontrol ve aksiyon takibi", date: today, completed: false, priority: "Yüksek", category: "Üretim", image: null }
            ]);
          }

          const savedTopics = localStorage.getItem("my_workspace_topics_v8");
          if (savedTopics) {
            setMeetingTopics(JSON.parse(savedTopics));
          } else {
            setMeetingTopics([]);
          }
        } catch (err) {
          console.error(err);
        }
      }, []);

      useEffect(() => {
        try {
          if (tasks.length > 0) localStorage.setItem("my_workspace_tasks_v8", JSON.stringify(tasks));
        } catch (e) {}
      }, [tasks]);

      useEffect(() => {
        try {
          if (meetingTopics.length > 0) localStorage.setItem("my_workspace_topics_v8", JSON.stringify(meetingTopics));
        } catch (e) {}
      }, [meetingTopics]);

      const handleImageSelect = (evt) => {
        const file = evt.target.files && evt.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => setSelectedImage(reader.result);
          reader.readAsDataURL(file);
        }
      };

      const exportData = () => {
        const data = { tasks, meetingTopics };
        const jsonString = `data:text/json;charset=utf-8,${encodeURIComponent(JSON.stringify(data))}`;
        const downloadAnchor = document.createElement("a");
        downloadAnchor.setAttribute("href", jsonString);
        downloadAnchor.setAttribute("download", `IsAsistanim_Yedek_${selectedDate}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
      };

      const importData = (evt) => {
        const file = evt.target.files && evt.target.files[0];
        if (!file) return;
        const fileReader = new FileReader();
        fileReader.readAsText(file, "UTF-8");
        fileReader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            if (parsed.tasks) setTasks(parsed.tasks);
            if (parsed.meetingTopics) setMeetingTopics(parsed.meetingTopics);
            alert("Veriler başarıyla yüklendi!");
          } catch (err) {
            alert("Hatalı dosya formatı.");
          }
        };
      };

      const toggleListening = () => {
        if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
          alert("Tarayıcınız ses tanıma özelliğini desteklemiyor.");
          return;
        }

        if (isListening) {
          setIsListening(false);
        } else {
          setIsListening(true);
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          const recognition = new SpeechRecognition();
          recognition.lang = "tr-TR";
          recognition.continuous = false;

          recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            addTask(text);
            setIsListening(false);
          };
          recognition.onend = () => setIsListening(false);
          recognition.start();
        }
      };

      const addTask = (titleToUse) => {
        const title = titleToUse || newTaskTitle;
        if (!title.trim() && !selectedImage) return;
        const newTask = {
          id: Date.now().toString(),
          title: title || "Görsel Not",
          date: selectedDate,
          completed: false,
          priority: newTaskPriority || "Orta",
          category: newTaskCategory || "Üretim",
          image: selectedImage
        };
        setTasks([newTask, ...tasks]);
        setNewTaskTitle("");
        setSelectedImage(null);
        setShowAddForm(false);
      };

      const startEditing = (task) => {
        setEditingTaskId(task.id);
        setEditTitle(task.title || "");
        setEditPriority(task.priority || "Orta");
        setEditCategory(task.category || "Üretim");
      };

      const saveEditing = (id) => {
        setTasks(tasks.map(t => t.id === id ? { ...t, title: editTitle, priority: editPriority, category: editCategory } : t));
        setEditingTaskId(null);
      };

      const toggleTask = (id) => setTasks(tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
      const deleteTask = (id) => setTasks(tasks.filter(t => t.id !== id));

      const addMeetingTopic = () => {
        if (!newTopicTitle.trim()) return;
        setMeetingTopics([{ id: "top_" + Date.now(), title: newTopicTitle, notes: [] }, ...meetingTopics]);
        setNewTopicTitle("");
      };

      const addNoteToTopic = (topicId) => {
        if (!newNoteContent.trim()) return;
        setMeetingTopics(meetingTopics.map(top => {
          if (top.id === topicId) {
            return {
              ...top,
              notes: [{ id: "note_" + Date.now(), date: selectedDate, content: newNoteContent }, ...(top.notes || [])]
            };
          }
          return top;
        }));
        setNewNoteContent("");
      };

      const dayTasks = tasks.filter(t => {
        const isDateMatch = t.date === selectedDate;
        const titleSafe = (t.title || "").toLowerCase();
        const querySafe = (searchQuery || "").toLowerCase();
        return isDateMatch && titleSafe.includes(querySafe);
      });

      const completedCount = dayTasks.filter(t => t.completed).length;
      const progressPercent = dayTasks.length > 0 ? Math.round((completedCount / dayTasks.length) * 100) : 0;

      const calendarDays = (() => {
        const days = [];
        const base = new Date();
        for (let i = -3; i <= 7; i++) {
          const d = new Date(base);
          d.setDate(base.getDate() + i);
          const iso = d.toISOString().split("T")[0];
          const dayName = d.toLocaleDateString("tr-TR", { weekday: "short" });
          const dayNum = d.getDate();
          days.push({ iso, dayName, dayNum });
        }
        return days;
      })();

      const getPriorityBadgeClass = (p) => {
        switch (p) {
          case "Yüksek": return "bg-red-50 text-red-600 dark:bg-red-900/30 dark:text-red-300 border border-red-200 dark:border-red-800";
          case "Orta": return "bg-amber-50 text-amber-600 dark:bg-amber-900/30 dark:text-amber-300 border border-amber-200 dark:border-amber-800";
          default: return "bg-emerald-50 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-300 border border-emerald-200 dark:border-emerald-800";
        }
      };

      return e("div", { className: "max-w-md mx-auto min-h-screen flex flex-col pb-10" },
        e("input", { type: "file", accept: "image/*", ref: fileInputRef, onChange: handleImageSelect, className: "hidden" }),
        e("input", { type: "file", accept: ".json", ref: importInputRef, onChange: importData, className: "hidden" }),

        // Header
        e("header", { className: "p-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white/90 dark:bg-slate-900/90 sticky top-0 z-30" },
          e("div", { className: "flex items-center gap-2" },
            e("div", { className: "w-8 h-8 rounded-xl bg-blue-600 flex items-center justify-center text-white font-black text-sm" }, "⚡"),
            e("div", null,
              e("h1", { className: "font-bold text-sm text-slate-900 dark:text-white" }, "İş Asistanım"),
              e("p", { className: "text-[10px] text-slate-400" }, "Kişisel Görev & Not Yönetimi")
            )
          ),
          e("div", { className: "flex items-center gap-1.5" },
            e("button", { onClick: exportData, title: "Yedek İndir", className: "p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-xs" }, "📤"),
            e("button", { onClick: () => importInputRef.current && importInputRef.current.click(), title: "Yedek Yükle", className: "p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-xs" }, "📥"),
            e("button", { onClick: () => setDarkMode(!darkMode), className: "p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-xs" }, darkMode ? "☀️" : "🌙")
          )
        ),

        e("main", { className: "p-4 space-y-4" },
          // Search
          e("div", { className: "relative" },
            e("input", {
              type: "text",
              placeholder: "Görevlerde ara...",
              value: searchQuery,
              onChange: (ev) => setSearchQuery(ev.target.value),
              className: "w-full pl-9 pr-4 py-2.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl text-xs"
            }),
            e("span", { className: "absolute left-3 top-3 text-slate-400 text-xs" }, "🔍")
          ),

          // Tabs
          e("div", { className: "flex bg-slate-200/60 dark:bg-slate-800/80 p-1 rounded-2xl gap-1" },
            e("button", {
              onClick: () => setActiveTab("daily"),
              className: `flex-1 py-2 text-xs font-bold rounded-xl ${activeTab === "daily" ? "bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm" : "text-slate-500"}`
            }, "☑️ Günlük Görevler"),
            e("button", {
              onClick: () => setActiveTab("meetings"),
              className: `flex-1 py-2 text-xs font-bold rounded-xl ${activeTab === "meetings" ? "bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm" : "text-slate-500"}`
            }, "📁 Toplantı Konuları")
          ),

          // Calendar Strip
          e("section", { className: "bg-white dark:bg-slate-800 p-3 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-xs" },
            e("div", { className: "flex items-center justify-between mb-2 px-1" },
              e("span", { className: "text-xs font-bold text-slate-700 dark:text-slate-200" }, `📅 ${selectedDate}`),
              e("input", {
                type: "date",
                value: selectedDate,
                onChange: (ev) => setSelectedDate(ev.target.value),
                className: "text-xs bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-2 py-1 rounded-lg border border-slate-200 dark:border-slate-600"
              })
            ),
            e("div", { className: "flex gap-2 overflow-x-auto pb-1" },
              calendarDays.map((d) => {
                const isSelected = d.iso === selectedDate;
                return e("button", {
                  key: d.iso,
                  onClick: () => setSelectedDate(d.iso),
                  className: `flex-shrink-0 w-11 py-2 rounded-xl flex flex-col items-center justify-center ${isSelected ? "bg-blue-600 text-white" : "bg-slate-50 dark:bg-slate-700/40 text-slate-600 dark:text-slate-300"}`
                },
                  e("span", { className: "text-[10px]" }, d.dayName),
                  e("span", { className: "text-xs font-bold mt-0.5" }, d.dayNum)
                );
              })
            )
          ),

          // Progress
          e("div", { className: "bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-3.5 text-white flex items-center justify-between" },
            e("div", null,
              e("p", { className: "text-[10px] text-blue-100 font-semibold uppercase" }, "Günlük İlerleme"),
              e("h3", { className: "text-sm font-bold mt-0.5" }, `${completedCount} / ${dayTasks.length} Tamamlandı`)
            ),
            e("div", { className: "text-sm font-extrabold bg-white/20 px-2.5 py-1 rounded-xl" }, `%${progressPercent}`)
          ),

          // Action Buttons
          e("div", { className: "grid grid-cols-3 gap-2" },
            e("button", {
              onClick: () => setShowAddForm(!showAddForm),
              className: "p-2.5 bg-blue-50 dark:bg-blue-950/40 border border-blue-200 dark:border-blue-800 rounded-2xl flex items-center justify-center gap-1.5 text-blue-600 dark:text-blue-400 font-bold text-xs"
            }, showAddForm ? "✖️ Kapat" : "➕ Yeni Görev"),

            e("button", {
              onClick: toggleListening,
              className: `p-2.5 border rounded-2xl flex items-center justify-center gap-1.5 font-bold text-xs ${isListening ? "bg-red-500 text-white" : "bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200"}`
            }, isListening ? "🎙️ Dinliyor..." : "🎙️ Sesle Ekle"),

            e("button", {
              onClick: () => fileInputRef.current && fileInputRef.current.click(),
              className: "p-2.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl flex items-center justify-center gap-1.5 text-slate-700 dark:text-slate-200 font-bold text-xs"
            }, "📷 Resim Ekle")
          ),

          selectedImage && e("div", { className: "bg-white dark:bg-slate-800 p-2.5 rounded-2xl border border-blue-200 flex items-center justify-between" },
            e("div", { className: "flex items-center gap-2" },
              e("img", { src: selectedImage, className: "w-10 h-10 object-cover rounded-lg" }),
              e("span", { className: "text-xs text-slate-600 dark:text-slate-300 font-medium" }, "Resim Eklendi")
            ),
            e("button", { onClick: () => setSelectedImage(null), className: "text-red-500 text-xs font-bold" }, "Kaldır")
          ),

          // Form
          showAddForm && e("section", { className: "bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-200 dark:border-slate-700 space-y-3" },
            e("h3", { className: "text-xs font-bold text-slate-800 dark:text-slate-100" }, `✍️ ${selectedDate} İçin Yeni Görev`),
            e("textarea", {
              rows: "2",
              placeholder: "Görev detayını yazın...",
              value: newTaskTitle,
              onChange: (ev) => setNewTaskTitle(ev.target.value),
              className: "w-full p-2.5 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl text-xs"
            }),
            e("div", { className: "flex gap-2" },
              e("select", {
                value: newTaskPriority,
                onChange: (ev) => setNewTaskPriority(ev.target.value),
                className: "flex-1 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl text-[11px] p-2 text-slate-700 dark:text-slate-200"
              },
                e("option", { value: "Düşük" }, "🟢 Düşük Öncelik"),
                e("option", { value: "Orta" }, "🟡 Orta Öncelik"),
                e("option", { value: "Yüksek" }, "🔴 Yüksek Öncelik")
              ),
              e("select", {
                value: newTaskCategory,
                onChange: (ev) => setNewTaskCategory(ev.target.value),
                className: "flex-1 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl text-[11px] p-2 text-slate-700 dark:text-slate-200"
              },
                e("option", { value: "Üretim" }, "⚙️ Üretim"),
                e("option", { value: "Kalite" }, "🔍 Kalite"),
                e("option", { value: "Toplantı" }, "🤝 Toplantı"),
                e("option", { value: "Kişisel" }, "👤 Kişisel")
              )
            ),
            e("button", { onClick: () => addTask(), className: "w-full py-2 bg-blue-600 text-white rounded-xl text-xs font-bold" }, "Kaydet ve Ekle")
          ),

          // Daily Tab
          activeTab === "daily" && e("div", { className: "space-y-2.5" },
            dayTasks.length === 0 
              ? e("div", { className: "p-8 text-center bg-white dark:bg-slate-800/60 rounded-2xl border border-dashed border-slate-200 dark:border-slate-700 text-slate-400 text-xs" }, "Görev bulunmuyor.")
              : dayTasks.map(task => {
                const isEditing = editingTaskId === task.id;
                return e("div", { key: task.id, className: "p-3.5 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700" },
                  isEditing 
                    ? e("div", { className: "space-y-2" },
                      e("textarea", {
                        value: editTitle,
                        onChange: (ev) => setEditTitle(ev.target.value),
                        className: "w-full p-2 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-xs",
                        rows: "2"
                      }),
                      e("div", { className: "flex justify-end gap-2" },
                        e("button", { onClick: () => setEditingTaskId(null), className: "px-3 py-1 bg-slate-200 dark:bg-slate-700 text-[11px] rounded-lg" }, "İptal"),
                        e("button", { onClick: () => saveEditing(task.id), className: "px-3 py-1 bg-blue-600 text-white text-[11px] rounded-lg" }, "Kaydet")
                      )
                    )
                    : e("div", { className: "space-y-2" },
                      e("div", { className: "flex items-start justify-between gap-3" },
                        e("div", { className: "flex items-start gap-2.5 flex-1" },
                          e("input", {
                            type: "checkbox",
                            checked: !!task.completed,
                            onChange: () => toggleTask(task.id),
                            className: "w-4 h-4 mt-0.5 rounded border-slate-300 text-blue-600 cursor-pointer accent-blue-600"
                          }),
                          e("p", { className: `text-xs leading-relaxed font-medium ${task.completed ? "line-through text-slate-400" : "text-slate-800 dark:text-slate-100"}` }, task.title)
                        ),
                        e("div", { className: "flex items-center gap-1" },
                          e("button", { onClick: () => startEditing(task), className: "text-slate-400 text-xs p-1" }, "✏️"),
                          e("button", { onClick: () => deleteTask(task.id), className: "text-slate-400 text-xs p-1" }, "🗑️")
                        )
                      ),
                      task.image && e("img", { src: task.image, className: "max-h-48 w-full object-cover rounded-xl border border-slate-100 dark:border-slate-700" }),
                      e("div", { className: "flex items-center gap-1.5 pt-1" },
                        e("span", { className: `text-[9px] px-2 py-0.5 rounded-md font-semibold ${getPriorityBadgeClass(task.priority)}` }, task.priority || "Orta"),
                        e("span", { className: "text-[9px] px-2 py-0.5 rounded-md font-semibold bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300" }, task.category || "Üretim")
                      )
                    )
                );
              })
          ),

          // Meetings Tab
          activeTab === "meetings" && e("div", { className: "space-y-3" },
            e("section", { className: "bg-white dark:bg-slate-800 p-3.5 rounded-2xl border border-slate-200 dark:border-slate-700 space-y-2" },
              e("h3", { className: "text-xs font-bold text-slate-800 dark:text-slate-100" }, "📁 Yeni Toplantı / Proje Başlığı"),
              e("div", { className: "flex gap-2" },
                e("input", {
                  type: "text",
                  placeholder: "Örn: Kalite Analizleri...",
                  value: newTopicTitle,
                  onChange: (ev) => setNewTopicTitle(ev.target.value),
                  className: "flex-1 px-3 py-2 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl text-xs"
                }),
                e("button", { onClick: addMeetingTopic, className: "px-3 py-2 bg-blue-600 text-white rounded-xl text-xs font-bold" }, "Aç")
              )
            ),
            e("div", { className: "space-y-2.5" },
              meetingTopics.map((topic) => {
                const isExpanded = selectedTopicId === topic.id;
                const notesList = topic.notes || [];

                return e("div", { key: topic.id, className: "bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 overflow-hidden" },
                  e("div", {
                    onClick: () => setSelectedTopicId(isExpanded ? null : topic.id),
                    className: "p-3.5 flex items-center justify-between cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/30"
                  },
                    e("div", { className: "flex items-center gap-2.5" },
                      e("span", { className: "text-base" }, "📁"),
                      e("div", null,
                        e("h4", { className: "font-bold text-xs text-slate-800 dark:text-slate-100" }, topic.title),
                        e("p", { className: "text-[10px] text-slate-400 mt-0.5" }, `${notesList.length} Not`)
                      )
                    ),
                    e("span", { className: "text-slate-400 text-xs" }, isExpanded ? "▲" : "▼")
                  ),
                  isExpanded && e("div", { className: "p-3.5 pt-0 border-t border-slate-100 dark:border-slate-700/50 space-y-3 bg-slate-50/50 dark:bg-slate-800/40" },
                    e("div", { className: "mt-3 space-y-2" },
                      e("label", { className: "text-[10px] font-bold text-blue-600 dark:text-blue-400 block" }, `➕ (${selectedDate}) Tarihli Not Ekle:`),
                      e("textarea", {
                        rows: "2",
                        placeholder: "Not yazın...",
                        value: newNoteContent,
                        onChange: (ev) => setNewNoteContent(ev.target.value),
                        className: "w-full p-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-xs"
                      }),
                      e("button", { onClick: () => addNoteToTopic(topic.id), className: "w-full py-1.5 bg-blue-600 text-white rounded-xl text-xs font-bold" }, "Notu Kaydet")
                    ),
                    e("div", { className: "space-y-2 pt-1" },
                      notesList.map((note) => e("div", { key: note.id, className: "p-2.5 bg-white dark:bg-slate-700 rounded-xl border border-slate-200 dark:border-slate-600 space-y-1" },
                        e("div", { className: "flex justify-between items-center" },
                          e("span", { className: "text-[9px] font-bold text-blue-600 dark:text-blue-300 bg-blue-50 dark:bg-blue-950 px-1.5 py-0.5 rounded" }, `📅 ${note.date}`),
                          e("button", {
                            onClick: () => {
                              addTask(`[${topic.title}] ${note.content}`);
                              alert("Not görevlere aktarıldı!");
                            },
                            className: "text-[10px] text-indigo-600 dark:text-indigo-300 font-semibold"
                          }, "➡️ Göreve Aktar")
                        ),
                        e("p", { className: "text-xs text-slate-700 dark:text-slate-200 leading-relaxed" }, note.content)
                      ))
                    )
                  )
                );
              })
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(e(App));
  </script>
</body>
</html>
