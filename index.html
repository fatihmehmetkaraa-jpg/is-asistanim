<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İş Asistanım</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans transition-colors duration-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [darkMode, setDarkMode] = useState(false);
      const [activeTab, setActiveTab] = useState("daily");
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split("T")[0]);
      
      const [tasks, setTasks] = useState([]);
      
      // Toplantı Grupları (Ana Başlıklar ve İçindeki Tarihli Notlar)
      const [meetingTopics, setMeetingTopics] = useState([
        {
          id: "top_1",
          title: "Tapping Plate & Kaynak Süreleri",
          category: "Üretim",
          notes: [
            {
              id: "n1",
              date: "2026-07-20",
              content: "16 adet steel tapping plate montajında tork tabancası kullanımı değerlendirildi."
            },
            {
              id: "n2",
              date: "2026-07-23",
              content: "Kaynak istasyonunda 15 dakikalık standart sapma belirlendi, fikstür revize edilecek."
            }
          ]
        }
      ]);

      const [newTopicTitle, setNewTopicTitle] = useState("");
      const [newTopicCategory, setNewTopicCategory] = useState("Üretim");
      const [selectedTopicId, setSelectedTopicId] = useState(null);
      const [newNoteContent, setNewNoteContent] = useState("");

      const [newTaskTitle, setNewTaskTitle] = useState("");
      const [newTaskPriority, setNewTaskPriority] = useState("Orta");
      const [newTaskCategory, setNewTaskCategory] = useState("Üretim");
      const [searchQuery, setSearchQuery] = useState("");
      const [isListening, setIsListening] = useState(false);
      const [transcript, setTranscript] = useState("");

      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      useEffect(() => {
        const savedTasks = localStorage.getItem("my_workspace_tasks_v4");
        const savedTopics = localStorage.getItem("my_workspace_topics_v4");
        const today = new Date().toISOString().split("T")[0];
        
        if (savedTasks) setTasks(JSON.parse(savedTasks));
        else {
          setTasks([
            { id: "1", title: "Dünkü kontrol ve aksiyon takibi", date: today, completed: false, priority: "Yüksek", category: "Üretim" },
            { id: "2", title: "Montaj ve kaynak süreleri raporu", date: today, completed: false, priority: "Orta", category: "Kalite" }
          ]);
        }

        if (savedTopics) setMeetingTopics(JSON.parse(savedTopics));
      }, []);

      useEffect(() => {
        if (tasks.length > 0) localStorage.setItem("my_workspace_tasks_v4", JSON.stringify(tasks));
      }, [tasks]);

      useEffect(() => {
        localStorage.setItem("my_workspace_topics_v4", JSON.stringify(meetingTopics));
      }, [meetingTopics]);

      const toggleListening = () => {
        if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
          alert("Tarayıcınız ses tanıma özelliğini desteklemiyor.");
          return;
        }

        if (isListening) {
          setIsListening(false);
        } else {
          setIsListening(true);
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          const recognition = new SpeechRecognition();
          recognition.lang = "tr-TR";
          recognition.continuous = false;
          recognition.interimResults = true;

          recognition.onresult = (event) => {
            const text = Array.from(event.results).map((r) => r[0].transcript).join("");
            setTranscript(text);
          };
          recognition.onend = () => setIsListening(false);
          recognition.start();
        }
      };

      const addTask = (titleToUse) => {
        const title = titleToUse || newTaskTitle;
        if (!title.trim()) return;
        const newTask = {
          id: Date.now().toString(),
          title: title,
          date: selectedDate,
          completed: false,
          priority: newTaskPriority,
          category: newTaskCategory
        };
        setTasks([newTask, ...tasks]);
        if (!titleToUse) setNewTaskTitle("");
        setTranscript("");
      };

      const addMeetingTopic = () => {
        if (!newTopicTitle.trim()) return;
        const topic = {
          id: "top_" + Date.now(),
          title: newTopicTitle,
          category: newTopicCategory,
          notes: []
        };
        setMeetingTopics([topic, ...meetingTopics]);
        setNewTopicTitle("");
      };

      const addNoteToTopic = (topicId) => {
        if (!newNoteContent.trim()) return;
        setMeetingTopics(meetingTopics.map(top => {
          if (top.id === topicId) {
            return {
              ...top,
              notes: [
                { id: "note_" + Date.now(), date: selectedDate, content: newNoteContent },
                ...top.notes
              ]
            };
          }
          return top;
        }));
        setNewNoteContent("");
      };

      const toggleTask = (id) => {
        setTasks(tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
      };

      const deleteTask = (id) => {
        setTasks(tasks.filter(t => t.id !== id));
      };

      const dayTasks = tasks.filter(t => t.date === selectedDate && t.title.toLowerCase().includes(searchQuery.toLowerCase()));
      const completedCount = dayTasks.filter(t => t.completed).length;
      const progressPercent = dayTasks.length > 0 ? Math.round((completedCount / dayTasks.length) * 100) : 0;

      const calendarDays = (() => {
        const days = [];
        const base = new Date();
        for (let i = -3; i <= 10; i++) {
          const d = new Date(base);
          d.setDate(base.getDate() + i);
          const iso = d.toISOString().split("T")[0];
          const dayName = d.toLocaleDateString("tr-TR", { weekday: "short" });
          const dayNum = d.getDate();
          days.push({ iso, dayName, dayNum });
        }
        return days;
      })();

      const getPriorityBadge = (p) => {
        switch (p) {
          case "Yüksek": return "bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300";
          case "Orta": return "bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300";
          default: return "bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300";
        }
      };

      return (
        <div className="max-w-md mx-auto min-h-screen flex flex-col pb-12">
          
          {/* HEADER */}
          <header className="p-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-20">
            <div className="flex items-center gap-2">
              <span className="text-2xl">⚡</span>
              <h1 className="font-bold text-lg text-slate-900 dark:text-white">İş Asistanım</h1>
            </div>
            <button 
              onClick={() => setDarkMode(!darkMode)}
              className="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-xs font-semibold flex items-center gap-1.5"
            >
              {darkMode ? "☀️ Aydınlık" : "🌙 Koyu"}
            </button>
          </header>

          <main className="p-4 space-y-4">

            {/* ARAMA */}
            <div className="relative">
              <input
                type="text"
                placeholder="Görev veya toplantılarda ara..."
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                className="w-full pl-9 pr-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl text-xs text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm"
              />
              <span className="absolute left-3 top-2.5 text-slate-400 text-xs">🔍</span>
            </div>

            {/* SEKMELER */}
            <div className="flex bg-slate-200/80 dark:bg-slate-800 p-1 rounded-2xl gap-1">
              <button
                onClick={() => setActiveTab("daily")}
                className={`flex-1 py-2 text-xs font-bold rounded-xl transition ${
                  activeTab === "daily" 
                    ? "bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm" 
                    : "text-slate-600 dark:text-slate-400"
                }`}
              >
                ☑️ Günlük Görevler
              </button>
              <button
                onClick={() => setActiveTab("meetings")}
                className={`flex-1 py-2 text-xs font-bold rounded-xl transition ${
                  activeTab === "meetings" 
                    ? "bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm" 
                    : "text-slate-600 dark:text-slate-400"
                }`}
              >
                📁 Toplantı Konuları
              </button>
            </div>

            {/* TAKVİM ŞERİDİ */}
            <section className="bg-white dark:bg-slate-800 p-3 rounded-2xl border border-slate-200 dark:border-slate-700/60 shadow-sm">
              <div className="flex items-center justify-between mb-2.5 px-1">
                <span className="text-xs font-bold text-slate-700 dark:text-slate-200">
                  📅 {selectedDate === new Date().toISOString().split("T")[0] ? "Bugün" : selectedDate}
                </span>
                <input 
                  type="date" 
                  value={selectedDate}
                  onChange={(e) => setSelectedDate(e.target.value)}
                  className="text-xs bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-2 py-1 rounded-lg focus:outline-none"
                />
              </div>

              <div className="flex gap-2 overflow-x-auto pb-1 scrollbar-none">
                {calendarDays.map((d) => {
                  const isSelected = d.iso === selectedDate;
                  const isToday = d.iso === new Date().toISOString().split("T")[0];
                  const hasTasks = tasks.some(t => t.date === d.iso && !t.completed);

                  return (
                    <button
                      key={d.iso}
                      onClick={() => setSelectedDate(d.iso)}
                      className={`flex-shrink-0 w-11 py-2 rounded-xl flex flex-col items-center justify-center transition-all ${
                        isSelected 
                          ? "bg-blue-600 text-white shadow-md shadow-blue-500/30" 
                          : isToday 
                          ? "bg-blue-50 dark:bg-blue-950/50 text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-blue-800"
                          : "bg-slate-50 dark:bg-slate-700/50 text-slate-600 dark:text-slate-300"
                      }`}
                    >
                      <span className="text-[10px] font-medium opacity-80">{d.dayName}</span>
                      <span className="text-xs font-bold mt-0.5">{d.dayNum}</span>
                      {hasTasks && <span className={`w-1.5 h-1.5 rounded-full mt-1 ${isSelected ? "bg-white" : "bg-blue-500"}`}></span>}
                    </button>
                  );
                })}
              </div>
            </section>

            {/* İLERLEME KARTI */}
            <div className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-3.5 text-white shadow-md flex items-center justify-between">
              <div>
                <p className="text-[11px] text-blue-100 font-medium">Seçili Günün Durumu</p>
                <h3 className="text-base font-bold mt-0.5">{completedCount} / {dayTasks.length} Görev Bitti</h3>
              </div>
              <div className="w-10 h-10 rounded-full border-2 border-white/30 flex items-center justify-center font-extrabold text-xs bg-white/10">
                %{progressPercent}
              </div>
            </div>

            {/* KOMPAKT APPLE WIDGET BUTONLARI */}
            <section className="grid grid-cols-4 gap-2">
              <button
                onClick={toggleListening}
                className={`p-2.5 rounded-2xl border flex flex-col items-center gap-1 text-center transition ${
                  isListening ? "bg-red-500 text-white border-red-600 animate-pulse" : "bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700/80 shadow-sm"
                }`}
              >
                <span className="text-lg">🎙️</span>
                <span className="text-[10px] font-semibold">{isListening ? "Dinliyor" : "Bas-Konuş"}</span>
              </button>

              <button
                onClick={() => {
                  const title = prompt(`${selectedDate} için görev ekleyin:`);
                  if (title) addTask(title);
                }}
                className="p-2.5 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700/80 shadow-sm flex flex-col items-center gap-1 text-center"
              >
                <span className="text-lg">➕</span>
                <span className="text-[10px] font-semibold">Görev Ekle</span>
              </button>

              <button
                onClick={() => alert("Görsel ekleme modu aktif.")}
                className="p-2.5 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700/80 shadow-sm flex flex-col items-center gap-1 text-center"
              >
                <span className="text-lg">📷</span>
                <span className="text-[10px] font-semibold">Resim Ekle</span>
              </button>

              <button
                onClick={() => alert("Dosya ekleme modu aktif.")}
                className="p-2.5 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700/80 shadow-sm flex flex-col items-center gap-1 text-center"
              >
                <span className="text-lg">📎</span>
                <span className="text-[10px] font-semibold">Dosya Ekle</span>
              </button>
            </section>

            {/* SES METNİ */}
            {transcript && (
              <div className="bg-blue-50 dark:bg-blue-950/40 p-3 rounded-2xl border border-blue-200 dark:border-blue-800 flex flex-col gap-2">
                <p className="text-xs text-blue-900 dark:text-blue-200 italic">"{transcript}"</p>
                <button
                  onClick={() => addTask(transcript)}
                  className="self-end px-3 py-1 bg-blue-600 text-white text-[10px] font-semibold rounded-xl"
                >
                  {selectedDate} Tarihine Ekle
                </button>
              </div>
            )}

            {/* İÇERİK 1: GÜNLÜK GÖREVLER */}
            {activeTab === "daily" && (
              <div className="space-y-3">
                <section className="bg-white dark:bg-slate-800 p-3.5 rounded-2xl border border-slate-200 dark:border-slate-700/60 shadow-sm space-y-2.5">
                  <h3 className="text-xs font-bold text-slate-700 dark:text-slate-200">
                    📝 {selectedDate} Tarihine İş Ekle
                  </h3>
                  <input
                    type="text"
                    placeholder="Görev yazın..."
                    value={newTaskTitle}
                    onChange={(e) => setNewTaskTitle(e.target.value)}
                    className="w-full px-3 py-2 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl text-xs text-slate-800 dark:text-slate-100 focus:outline-none"
                  />
                  <div className="flex gap-2">
                    <select
                      value={newTaskPriority}
                      onChange={(e) => setNewTaskPriority(e.target.value)}
                      className="flex-1 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl text-[10px] p-2 text-slate-700 dark:text-slate-200"
                    >
                      <option value="Düşük">🟢 Düşük Öncelik</option>
                      <option value="Orta">🟡 Orta Öncelik</option>
                      <option value="Yüksek">🔴 Yüksek Öncelik</option>
                    </select>

                    <select
                      value={newTaskCategory}
                      onChange={(e) => setNewTaskCategory(e.target.value)}
                      className="flex-1 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl text-[10px] p-2 text-slate-700 dark:text-slate-200"
                    >
                      <option value="Üretim">⚙️ Üretim</option>
                      <option value="Kalite">🔍 Kalite</option>
                      <option value="Toplantı">🤝 Toplantı</option>
                      <option value="Kişisel">👤 Kişisel</option>
                    </select>

                    <button
                      onClick={() => addTask()}
                      className="px-4 py-1.5 bg-blue-600 text-white rounded-xl text-xs font-semibold"
                    >
                      Ekle
                    </button>
                  </div>
                </section>

                <div className="space-y-2">
                  {dayTasks.length === 0 ? (
                    <div className="p-6 text-center bg-white dark:bg-slate-800 rounded-2xl border border-dashed border-slate-200 dark:border-slate-700 text-slate-400 text-xs">
                      Bu tarih için tanımlanmış bir görev yok.
                    </div>
                  ) : (
                    dayTasks.map((task) => (
                      <div
                        key={task.id}
                        className="p-3 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700/60 shadow-sm flex items-center justify-between gap-2"
                      >
                        <div className="flex items-center gap-2.5 flex-1 min-w-0">
                          <input
                            type="checkbox"
                            checked={task.completed}
                            onChange={() => toggleTask(task.id)}
                            className="w-4 h-4 rounded border-slate-300 text-blue-600 cursor-pointer accent-blue-600"
                          />
                          <div className="flex flex-col truncate">
                            <span className={`text-xs font-medium truncate ${task.completed ? "line-through text-slate-400" : "text-slate-800 dark:text-slate-100"}`}>
                              {task.title}
                            </span>
                            <div className="flex gap-1 mt-1">
                              <span className={`text-[9px] px-1.5 py-0.5 rounded-md font-semibold ${getPriorityBadge(task.priority)}`}>
                                {task.priority}
                              </span>
                              <span className="text-[9px] px-1.5 py-0.5 rounded-md font-semibold bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300">
                                {task.category}
                              </span>
                            </div>
                          </div>
                        </div>

                        <button onClick={() => deleteTask(task.id)} className="text-slate-300 hover:text-red-500 text-xs p-1">
                          🗑️
                        </button>
                      </div>
                    ))
                  )}
                </div>
              </div>
            )}

            {/* İÇERİK 2: KONU BAZLI TOPLANTILAR (YENİ DİZAYN) */}
            {activeTab === "meetings" && (
              <div className="space-y-3">
                {/* YENİ TOPLANTI ANA BAŞLIĞI OLUŞTURMA */}
                <section className="bg-white dark:bg-slate-800 p-3.5 rounded-2xl border border-slate-200 dark:border-slate-700/60 shadow-sm space-y-2">
                  <h3 className="text-xs font-bold text-slate-700 dark:text-slate-200">
                    📁 Yeni Toplantı Ana Başlığı (Proje / Konu)
                  </h3>
                  <div className="flex gap-2">
                    <input
                      type="text"
                      placeholder="Örn: Alstom Projesi Kalite Değerlendirmeleri..."
                      value={newTopicTitle}
                      onChange={(e) => setNewTopicTitle(e.target.value)}
                      className="flex-1 px-3 py-1.5 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl text-xs text-slate-800 dark:text-slate-100 focus:outline-none"
                    />
                    <select
                      value={newTopicCategory}
                      onChange={(e) => setNewTopicCategory(e.target.value)}
                      className="bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl text-[10px] px-2 text-slate-700 dark:text-slate-200"
                    >
                      <option value="Üretim">⚙️ Üretim</option>
                      <option value="Kalite">🔍 Kalite</option>
                      <option value="Genel">📌 Genel</option>
                    </select>
                    <button
                      onClick={addMeetingTopic}
                      className="px-3 py-1.5 bg-blue-600 text-white rounded-xl text-xs font-semibold"
                    >
                      Başlık Aç
                    </button>
                  </div>
                </section>

                {/* TOPLANTI BAŞLIKLARI LİSTESİ */}
                <div className="space-y-3">
                  {meetingTopics.map((topic) => {
                    const isExpanded = selectedTopicId === topic.id;

                    return (
                      <div key={topic.id} className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700/60 shadow-sm overflow-hidden">
                        {/* BAŞLIK KARTI HEADER */}
                        <div 
                          onClick={() => setSelectedTopicId(isExpanded ? null : topic.id)}
                          className="p-3.5 flex items-center justify-between cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/30 transition"
                        >
                          <div className="flex items-center gap-2.5">
                            <span className="text-base">📁</span>
                            <div>
                              <h4 className="font-bold text-xs text-slate-900 dark:text-slate-100">{topic.title}</h4>
                              <p className="text-[10px] text-slate-400 mt-0.5">{topic.notes.length} Adet Tarihli Not Var</p>
                            </div>
                          </div>
                          <span className="text-slate-400 text-xs">{isExpanded ? "▲" : "▼"}</span>
                        </div>

                        {/* BAŞLIK DETAYI & TARİHLİ NOTLAR (AÇILIR KAPANIR) */}
                        {isExpanded && (
                          <div className="p-3.5 pt-0 border-t border-slate-100 dark:border-slate-700/50 space-y-3 bg-slate-50/50 dark:bg-slate-800/50">
                            
                            {/* BU BAŞLIĞA YENİ TARİHLİ NOT EKLEME */}
                            <div className="mt-3 space-y-2">
                              <label className="text-[10px] font-bold text-blue-600 dark:text-blue-400 block">
                                ➕ ({selectedDate}) Tarihi İle Bu Başlığa Yeni Not Ekle:
                              </label>
                              <textarea
                                rows="2"
                                placeholder="Bu toplantıda alınan kararlar, notlar..."
                                value={newNoteContent}
                                onChange={(e) => setNewNoteContent(e.target.value)}
                                className="w-full p-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-xs focus:outline-none"
                              ></textarea>
                              <button
                                onClick={() => addNoteToTopic(topic.id)}
                                className="w-full py-1.5 bg-blue-600 text-white rounded-xl text-xs font-semibold shadow-sm"
                              >
                                Notu Kaydet
                              </button>
                            </div>

                            {/* GEÇMİŞ NOTLAR SİLSİLESİ */}
                            <div className="space-y-2 mt-2">
                              <h5 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Geçmiş Toplantı Notları</h5>
                              {topic.notes.length === 0 ? (
                                <p className="text-[11px] text-slate-400 italic">Henüz bu başlık altında kayıtlı bir not yok.</p>
                              ) : (
                                topic.notes.map((note) => (
                                  <div key={note.id} className="p-2.5 bg-white dark:bg-slate-700 rounded-xl border border-slate-200/80 dark:border-slate-600 shadow-2xs space-y-1">
                                    <div className="flex justify-between items-center">
                                      <span className="text-[10px] font-bold text-blue-600 dark:text-blue-300 bg-blue-50 dark:bg-blue-950 px-1.5 py-0.5 rounded">
                                        📅 {note.date}
                                      </span>
                                      <button
                                        onClick={() => {
                                          addTask(`[Toplantı Notu: ${topic.title}] ${note.content}`);
                                          alert(`Not ${selectedDate} tarihine görev olarak eklendi!`);
                                        }}
                                        className="text-[10px] text-indigo-600 dark:text-indigo-300 font-semibold hover:underline"
                                      >
                                        ➡️ Göreve Aktar
                                      </button>
                                    </div>
                                    <p className="text-xs text-slate-700 dark:text-slate-200 leading-relaxed">
                                      {note.content}
                                    </p>
                                  </div>
                                ))
                              )}
                            </div>

                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
