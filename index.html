<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İş Asistanım</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans antialiased selection:bg-blue-500 selection:text-white min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [darkMode, setDarkMode] = useState(false);
      const [activeTab, setActiveTab] = useState("daily");
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split("T")[0]);

      const fileInputRef = useRef(null);
      const importInputRef = useRef(null);
      const [selectedImage, setSelectedImage] = useState(null);

      const [tasks, setTasks] = useState([]);
      const [meetingTopics, setMeetingTopics] = useState([]);

      // Form Kontrolleri
      const [showAddForm, setShowAddForm] = useState(false);
      const [newTaskTitle, setNewTaskTitle] = useState("");
      const [newTaskPriority, setNewTaskPriority] = useState("Orta");
      const [newTaskCategory, setNewTaskCategory] = useState("Üretim");

      // Düzenleme Modu State'leri
      const [editingTaskId, setEditingTaskId] = useState(null);
      const [editTitle, setEditTitle] = useState("");
      const [editPriority, setEditPriority] = useState("Orta");
      const [editCategory, setEditCategory] = useState("Üretim");

      // Toplantı State'leri
      const [newTopicTitle, setNewTopicTitle] = useState("");
      const [newTopicCategory, setNewTopicCategory] = useState("Üretim");
      const [selectedTopicId, setSelectedTopicId] = useState(null);
      const [newNoteContent, setNewNoteContent] = useState("");

      const [searchQuery, setSearchQuery] = useState("");
      const [isListening, setIsListening] = useState(false);

      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      // İlk Yükleme
      useEffect(() => {
        const savedTasks = localStorage.getItem("my_workspace_tasks_v6");
        const savedTopics = localStorage.getItem("my_workspace_topics_v6");
        const today = new Date().toISOString().split("T")[0];

        if (savedTasks) setTasks(JSON.parse(savedTasks));
        else {
          setTasks([
            { id: "1", title: "Dünkü kontrol ve aksiyon takibi", date: today, completed: false, priority: "Yüksek", category: "Üretim", image: null },
            { id: "2", title: "Montaj ve kaynak süreleri raporu detaylı incelemesi ve yöneticilere sunumu", date: today, completed: false, priority: "Orta", category: "Kalite", image: null }
          ]);
        }

        if (savedTopics) setMeetingTopics(JSON.parse(savedTopics));
      }, []);

      useEffect(() => {
        localStorage.setItem("my_workspace_tasks_v6", JSON.stringify(tasks));
      }, [tasks]);

      useEffect(() => {
        localStorage.setItem("my_workspace_topics_v6", JSON.stringify(meetingTopics));
      }, [meetingTopics]);

      // Görsel Yükleme
      const handleImageSelect = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => setSelectedImage(reader.result);
          reader.readAsDataURL(file);
        }
      };

      // Veri Yedekleme / Aktarma
      const exportData = () => {
        const data = { tasks, meetingTopics };
        const jsonString = `data:text/json;charset=utf-8,${encodeURIComponent(JSON.stringify(data))}`;
        const downloadAnchor = document.createElement("a");
        downloadAnchor.setAttribute("href", jsonString);
        downloadAnchor.setAttribute("download", `IsAsistanim_Yedek_${selectedDate}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
      };

      const importData = (e) => {
        const fileReader = new FileReader();
        if (e.target.files[0]) {
          fileReader.readAsText(e.target.files[0], "UTF-8");
          fileReader.onload = (event) => {
            try {
              const parsed = JSON.parse(event.target.result);
              if (parsed.tasks) setTasks(parsed.tasks);
              if (parsed.meetingTopics) setMeetingTopics(parsed.meetingTopics);
              alert("Veriler başarıyla aktarıldı!");
            } catch (err) {
              alert("Dosya okunamadı. Geçerli bir yedek dosyası seçtiğinizden emin olun.");
            }
          };
        }
      };

      const toggleListening = () => {
        if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
          alert("Tarayıcınız ses tanıma özelliğini desteklemiyor.");
          return;
        }

        if (isListening) {
          setIsListening(false);
        } else {
          setIsListening(true);
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          const recognition = new SpeechRecognition();
          recognition.lang = "tr-TR";
          recognition.continuous = false;

          recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            addTask(text);
            setIsListening(false);
          };
          recognition.onend = () => setIsListening(false);
          recognition.start();
        }
      };

      const addTask = (titleToUse) => {
        const title = titleToUse || newTaskTitle;
        if (!title.trim() && !selectedImage) return;
        const newTask = {
          id: Date.now().toString(),
          title: title || "Görsel Not",
          date: selectedDate,
          completed: false,
          priority: newTaskPriority,
          category: newTaskCategory,
          image: selectedImage
        };
        setTasks([newTask, ...tasks]);
        setNewTaskTitle("");
        setSelectedImage(null);
        setShowAddForm(false);
      };

      const startEditing = (task) => {
        setEditingTaskId(task.id);
        setEditTitle(task.title);
        setEditPriority(task.priority);
        setEditCategory(task.category);
      };

      const saveEditing = (id) => {
        setTasks(tasks.map(t => t.id === id ? { ...t, title: editTitle, priority: editPriority, category: editCategory } : t));
        setEditingTaskId(null);
      };

      const toggleTask = (id) => setTasks(tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
      const deleteTask = (id) => setTasks(tasks.filter(t => t.id !== id));

      const addMeetingTopic = () => {
        if (!newTopicTitle.trim()) return;
        setMeetingTopics([{ id: "top_" + Date.now(), title: newTopicTitle, category: newTopicCategory, notes: [] }, ...meetingTopics]);
        setNewTopicTitle("");
      };

      const addNoteToTopic = (topicId) => {
        if (!newNoteContent.trim()) return;
        setMeetingTopics(meetingTopics.map(top => {
          if (top.id === topicId) {
            return {
              ...top,
              notes: [{ id: "note_" + Date.now(), date: selectedDate, content: newNoteContent }, ...top.notes]
            };
          }
          return top;
        }));
        setNewNoteContent("");
      };

      const dayTasks = tasks.filter(t => t.date === selectedDate && t.title.toLowerCase().includes(searchQuery.toLowerCase()));
      const completedCount = dayTasks.filter(t => t.completed).length;
      const progressPercent = dayTasks.length > 0 ? Math.round((completedCount / dayTasks.length) * 100) : 0;

      const calendarDays = (() => {
        const days = [];
        const base = new Date();
        for (let i = -3; i <= 7; i++) {
          const d = new Date(base);
          d.setDate(base.getDate() + i);
          const iso = d.toISOString().split("T")[0];
          const dayName = d.toLocaleDateString("tr-TR", { weekday: "short" });
          const dayNum = d.getDate();
          days.push({ iso, dayName, dayNum });
        }
        return days;
      })();

      const getPriorityBadge = (p) => {
        switch (p) {
          case "Yüksek": return "bg-red-50 text-red-600 dark:bg-red-900/30 dark:text-red-300 border border-red-200 dark:border-red-800";
          case "Orta": return "bg-amber-50 text-amber-600 dark:bg-amber-900/30 dark:text-amber-300 border border-amber-200 dark:border-amber-800";
          default: return "bg-emerald-50 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-300 border border-emerald-200 dark:border-emerald-800";
        }
      };

      return (
        <div className="max-w-md mx-auto min-h-screen flex flex-col pb-10">

          <input type="file" accept="image/*" ref={fileInputRef} onChange={handleImageSelect} className="hidden" />
          <input type="file" accept=".json" ref={importInputRef} onChange={importData} className="hidden" />

          {/* HEADER */}
          <header className="p-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md sticky top-0 z-30">
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 rounded-xl bg-blue-600 flex items-center justify-center text-white font-black text-sm shadow-sm">⚡</div>
              <div>
                <h1 className="font-bold text-sm text-slate-900 dark:text-white leading-tight">İş Asistanım</h1>
                <p className="text-[10px] text-slate-400">Kişisel Görev & Not Yönetimi</p>
              </div>
            </div>
            
            <div className="flex items-center gap-1.5">
              <button 
                onClick={exportData} 
                title="Yedek İndir" 
                className="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-xs font-medium"
              >
                📤
              </button>
              <button 
                onClick={() => importInputRef.current && importInputRef.current.click()} 
                title="Yedek Yükle" 
                className="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-xs font-medium"
              >
                📥
              </button>
              <button 
                onClick={() => setDarkMode(!darkMode)}
                className="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-xs font-semibold"
              >
                {darkMode ? "☀️" : "🌙"}
              </button>
            </div>
          </header>

          <main className="p-4 space-y-4">

            {/* ARAMA BAR-I */}
            <div className="relative">
              <input
                type="text"
                placeholder="Görev veya konularda ara..."
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                className="w-full pl-9 pr-4 py-2.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700/80 rounded-2xl text-xs text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/40 shadow-xs"
              />
              <span className="absolute left-3 top-3 text-slate-400 text-xs">🔍</span>
            </div>

            {/* SEKMELER */}
            <div className="flex bg-slate-200/60 dark:bg-slate-800/80 p-1 rounded-2xl gap-1">
              <button
                onClick={() => setActiveTab("daily")}
                className={`flex-1 py-2 text-xs font-bold rounded-xl transition-all ${
                  activeTab === "daily" 
                    ? "bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm" 
                    : "text-slate-500 dark:text-slate-400"
                }`}
              >
                ☑️ Günlük Görevler
              </button>
              <button
                onClick={() => setActiveTab("meetings")}
                className={`flex-1 py-2 text-xs font-bold rounded-xl transition-all ${
                  activeTab === "meetings" 
                    ? "bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm" 
                    : "text-slate-500 dark:text-slate-400"
                }`}
              >
                📁 Toplantı Konuları
              </button>
            </div>

            {/* TAKVİM ŞERİDİ */}
            <section className="bg-white dark:bg-slate-800 p-3 rounded-2xl border border-slate-200/80 dark:border-slate-700/60 shadow-xs">
              <div className="flex items-center justify-between mb-2 px-1">
                <span className="text-xs font-bold text-slate-700 dark:text-slate-200">
                  📅 {selectedDate === new Date().toISOString().split("T")[0] ? "Bugün" : selectedDate}
                </span>
                <input 
                  type="date" 
                  value={selectedDate}
                  onChange={(e) => setSelectedDate(e.target.value)}
                  className="text-xs bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-2 py-1 rounded-lg focus:outline-none border border-slate-200 dark:border-slate-600"
                />
              </div>

              <div className="flex gap-2 overflow-x-auto pb-1 scrollbar-none">
                {calendarDays.map((d) => {
                  const isSelected = d.iso === selectedDate;
                  const isToday = d.iso === new Date().toISOString().split("T")[0];
                  const hasTasks = tasks.some(t => t.date === d.iso && !t.completed);

                  return (
                    <button
                      key={d.iso}
                      onClick={() => setSelectedDate(d.iso)}
                      className={`flex-shrink-0 w-11 py-2 rounded-xl flex flex-col items-center justify-center transition-all ${
                        isSelected 
                          ? "bg-blue-600 text-white shadow-md shadow-blue-500/20" 
                          : isToday 
                          ? "bg-blue-50 dark:bg-blue-950/50 text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-blue-800"
                          : "bg-slate-50 dark:bg-slate-700/40 text-slate-600 dark:text-slate-300"
                      }`}
                    >
                      <span className="text-[10px] font-medium opacity-80">{d.dayName}</span>
                      <span className="text-xs font-bold mt-0.5">{d.dayNum}</span>
                      {hasTasks && <span className={`w-1.5 h-1.5 rounded-full mt-1 ${isSelected ? "bg-white" : "bg-blue-500"}`}></span>}
                    </button>
                  );
                })}
              </div>
            </section>

            {/* İLERLEME SADELEŞTİRİLMİŞ KART */}
            <div className="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-3.5 text-white shadow-sm flex items-center justify-between">
              <div>
                <p className="text-[10px] text-blue-100 font-semibold tracking-wide uppercase">Günlük İlerleme</p>
                <h3 className="text-sm font-bold mt-0.5">{completedCount} / {dayTasks.length} Görev Tamamlandı</h3>
              </div>
              <div className="text-sm font-extrabold bg-white/20 px-2.5 py-1 rounded-xl">
                %{progressPercent}
              </div>
            </div>

            {/* HIZLI EYLEM BUTONLARI */}
            <div className="grid grid-cols-3 gap-2">
              <button
                onClick={() => setShowAddForm(!showAddForm)}
                className="p-2.5 bg-blue-50 dark:bg-blue-950/40 border border-blue-200 dark:border-blue-800/60 rounded-2xl flex items-center justify-center gap-1.5 text-blue-600 dark:text-blue-400 font-bold text-xs shadow-xs"
              >
                <span>{showAddForm ? "✖️" : "➕"}</span>
                <span>{showAddForm ? "Kapat" : "Yeni Görev"}</span>
              </button>

              <button
                onClick={toggleListening}
                className={`p-2.5 border rounded-2xl flex items-center justify-center gap-1.5 font-bold text-xs shadow-xs transition ${
                  isListening ? "bg-red-500 text-white border-red-600 animate-pulse" : "bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700/80 text-slate-700 dark:text-slate-200"
                }`}
              >
                <span>🎙️</span>
                <span>{isListening ? "Dinliyor..." : "Sesle Ekle"}</span>
              </button>

              <button
                onClick={() => fileInputRef.current && fileInputRef.current.click()}
                className="p-2.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700/80 rounded-2xl flex items-center justify-center gap-1.5 text-slate-700 dark:text-slate-200 font-bold text-xs shadow-xs"
              >
                <span>📷</span>
                <span>Resim Ekle</span>
              </button>
            </div>

            {/* SEÇİLEN RESİM ÖNİZLEME */}
            {selectedImage && (
              <div className="bg-white dark:bg-slate-800 p-2.5 rounded-2xl border border-blue-200 dark:border-blue-800 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <img src={selectedImage} alt="Seçilen" className="w-10 h-10 object-cover rounded-lg" />
                  <span className="text-xs text-slate-600 dark:text-slate-300 font-medium">Resim Göreve Eklenecek</span>
                </div>
                <button onClick={() => setSelectedImage(null)} className="text-red-500 text-xs font-bold px-2 py-1">Kaldır</button>
              </div>
            )}

            {/* AÇILIR GÖREV EKLEME FORMU (SADE TASARIM İÇİN) */}
            {showAddForm && (
              <section className="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm space-y-3">
                <h3 className="text-xs font-bold text-slate-800 dark:text-slate-100 flex items-center gap-1">
                  ✍️ {selectedDate} İçin Yeni Görev Oluştur
                </h3>
                <textarea
                  rows="2"
                  placeholder="Görev detayını veya notunu buraya yazın..."
                  value={newTaskTitle}
                  onChange={(e) => setNewTaskTitle(e.target.value)}
                  className="w-full p-2.5 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-blue-500/30"
                ></textarea>
                
                <div className="flex gap-2">
                  <select
                    value={newTaskPriority}
                    onChange={(e) => setNewTaskPriority(e.target.value)}
                    className="flex-1 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl text-[11px] p-2 text-slate-700 dark:text-slate-200"
                  >
                    <option value="Düşük">🟢 Düşük Öncelik</option>
                    <option value="Orta">🟡 Orta Öncelik</option>
                    <option value="Yüksek">🔴 Yüksek Öncelik</option>
                  </select>

                  <select
                    value={newTaskCategory}
                    onChange={(e) => setNewTaskCategory(e.target.value)}
                    className="flex-1 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl text-[11px] p-2 text-slate-700 dark:text-slate-200"
                  >
                    <option value="Üretim">⚙️ Üretim</option>
                    <option value="Kalite">🔍 Kalite</option>
                    <option value="Toplantı">🤝 Toplantı</option>
                    <option value="Kişisel">👤 Kişisel</option>
                  </select>
                </div>

                <button
                  onClick={() => addTask()}
                  className="w-full py-2 bg-blue-600 text-white rounded-xl text-xs font-bold shadow-sm"
                >
                  Kaydet ve Ekle
                </button>
              </section>
            )}

            {/* TAB 1: GÜNLÜK GÖREV LİSTESİ */}
            {activeTab === "daily" && (
              <div className="space-y-2.5">
                {dayTasks.length === 0 ? (
                  <div className="p-8 text-center bg-white dark:bg-slate-800/60 rounded-2xl border border-dashed border-slate-200 dark:border-slate-700/80 text-slate-400 text-xs">
                    Bu tarih için kayıtlı bir görev yok.
                  </div>
                ) : (
                  dayTasks.map((task) => {
                    const isEditing = editingTaskId === task.id;

                    return (
                      <div
                        key={task.id}
                        className="p-3.5 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200/80 dark:border-slate-700/70 shadow-2xs transition hover:border-slate-300 dark:hover:border-slate-600"
                      >
                        {isEditing ? (
                          /* DÜZENLEME MODU */
                          <div className="space-y-2.5">
                            <textarea
                              value={editTitle}
                              onChange={(e) => setEditTitle(e.target.value)}
                              className="w-full p-2 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-xs focus:outline-none"
                              rows="2"
                            />
                            <div className="flex gap-2">
                              <select
                                value={editPriority}
                                onChange={(e) => setEditPriority(e.target.value)}
                                className="flex-1 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-[10px] p-1.5"
                              >
                                <option value="Düşük">🟢 Düşük</option>
                                <option value="Orta">🟡 Orta</option>
                                <option value="Yüksek">🔴 Yüksek</option>
                              </select>
                              <select
                                value={editCategory}
                                onChange={(e) => setEditCategory(e.target.value)}
                                className="flex-1 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-[10px] p-1.5"
                              >
                                <option value="Üretim">⚙️ Üretim</option>
                                <option value="Kalite">🔍 Kalite</option>
                                <option value="Toplantı">🤝 Toplantı</option>
                                <option value="Kişisel">👤 Kişisel</option>
                              </select>
                            </div>
                            <div className="flex justify-end gap-2">
                              <button onClick={() => setEditingTaskId(null)} className="px-3 py-1 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-[11px] font-semibold rounded-lg">İptal</button>
                              <button onClick={() => saveEditing(task.id)} className="px-3 py-1 bg-blue-600 text-white text-[11px] font-semibold rounded-lg">Kaydet</button>
                            </div>
                          </div>
                        ) : (
                          /* NORMAL GÖRÜNÜM (ÇOK SATIRLI & TAM OKUNUR) */
                          <div className="space-y-2">
                            <div className="flex items-start justify-between gap-3">
                              <div className="flex items-start gap-2.5 flex-1">
                                <input
                                  type="checkbox"
                                  checked={task.completed}
                                  onChange={() => toggleTask(task.id)}
                                  className="w-4 h-4 mt-0.5 rounded border-slate-300 text-blue-600 cursor-pointer accent-blue-600 flex-shrink-0"
                                />
                                <p className={`text-xs leading-relaxed font-medium break-words ${task.completed ? "line-through text-slate-400 dark:text-slate-500" : "text-slate-800 dark:text-slate-100"}`}>
                                  {task.title}
                                </p>
                              </div>

                              <div className="flex items-center gap-1 flex-shrink-0">
                                <button onClick={() => startEditing(task)} title="Düzenle" className="text-slate-400 hover:text-blue-600 text-xs p-1">✏️</button>
                                <button onClick={() => deleteTask(task.id)} title="Sil" className="text-slate-400 hover:text-red-500 text-xs p-1">🗑️</button>
                              </div>
                            </div>

                            {/* GÖRSEL VARSA */}
                            {task.image && (
                              <div className="pt-1">
                                <img src={task.image} alt="Görsel" className="max-h-48 w-full object-cover rounded-xl border border-slate-100 dark:border-slate-700" />
                              </div>
                            )}

                            {/* ROLLER / ETİKETLER */}
                            <div className="flex items-center gap-1.5 pt-1">
                              <span className={`text-[9px] px-2 py-0.5 rounded-md font-semibold ${getPriorityBadge(task.priority)}`}>
                                {task.priority}
                              </span>
                              <span className="text-[9px] px-2 py-0.5 rounded-md font-semibold bg-slate-100 dark:bg-slate-700/60 text-slate-600 dark:text-slate-300">
                                {task.category}
                              </span>
                            </div>
                          </div>
                        )}
                      </div>
                    ))
                  )}
                </div>
            )}

            {/* TAB 2: TOPLANTI KONULARI */}
            {activeTab === "meetings" && (
              <div className="space-y-3">
                <section className="bg-white dark:bg-slate-800 p-3.5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-xs space-y-2">
                  <h3 className="text-xs font-bold text-slate-800 dark:text-slate-100">
                    📁 Yeni Toplantı / Proje Başlığı
                  </h3>
                  <div className="flex gap-2">
                    <input
                      type="text"
                      placeholder="Örn: FSW Kaynak Kalite Analizleri..."
                      value={newTopicTitle}
                      onChange={(e) => setNewTopicTitle(e.target.value)}
                      className="flex-1 px-3 py-2 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl text-xs focus:outline-none"
                    />
                    <button onClick={addMeetingTopic} className="px-3 py-2 bg-blue-600 text-white rounded-xl text-xs font-bold">Aç</button>
                  </div>
                </section>

                <div className="space-y-2.5">
                  {meetingTopics.map((topic) => {
                    const isExpanded = selectedTopicId === topic.id;

                    return (
                      <div key={topic.id} className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200/80 dark:border-slate-700 shadow-2xs overflow-hidden">
                        <div 
                          onClick={() => setSelectedTopicId(isExpanded ? null : topic.id)}
                          className="p-3.5 flex items-center justify-between cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/30 transition"
                        >
                          <div className="flex items-center gap-2.5">
                            <span className="text-base">📁</span>
                            <div>
                              <h4 className="font-bold text-xs text-slate-800 dark:text-slate-100">{topic.title}</h4>
                              <p className="text-[10px] text-slate-400 mt-0.5">{topic.notes.length} Kayıtlı Not</p>
                            </div>
                          </div>
                          <span className="text-slate-400 text-xs">{isExpanded ? "▲" : "▼"}</span>
                        </div>

                        {isExpanded && (
                          <div className="p-3.5 pt-0 border-t border-slate-100 dark:border-slate-700/50 space-y-3 bg-slate-50/50 dark:bg-slate-800/40">
                            <div className="mt-3 space-y-2">
                              <label className="text-[10px] font-bold text-blue-600 dark:text-blue-400 block">
                                ➕ ({selectedDate}) Tarihli Not Ekle:
                              </label>
                              <textarea
                                rows="2"
                                placeholder="Alınan karar veya not..."
                                value={newNoteContent}
                                onChange={(e) => setNewNoteContent(e.target.value)}
                                className="w-full p-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-xs focus:outline-none"
                              ></textarea>
                              <button onClick={() => addNoteToTopic(topic.id)} className="w-full py-1.5 bg-blue-600 text-white rounded-xl text-xs font-bold">
                                Notu Kaydet
                              </button>
                            </div>

                            <div className="space-y-2 pt-1">
                              {topic.notes.map((note) => (
                                <div key={note.id} className="p-2.5 bg-white dark:bg-slate-700 rounded-xl border border-slate-200/60 dark:border-slate-600 shadow-2xs space-y-1">
                                  <div className="flex justify-between items-center">
                                    <span className="text-[9px] font-bold text-blue-600 dark:text-blue-300 bg-blue-50 dark:bg-blue-950 px-1.5 py-0.5 rounded">📅 {note.date}</span>
                                    <button 
                                      onClick={() => {
                                        addTask(`[${topic.title}] ${note.content}`);
                                        alert("Not günün görevlerine eklendi!");
                                      }}
                                      className="text-[10px] text-indigo-600 dark:text-indigo-300 font-semibold"
                                    >
                                      ➡️ Göreve Aktar
                                    </button>
                                  </div>
                                  <p className="text-xs text-slate-700 dark:text-slate-200 leading-relaxed">{note.content}</p>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
