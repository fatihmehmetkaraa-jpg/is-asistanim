<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İş Asistanım Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- PDF Oluşturma Kütüphanesi -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getFirestore, 
      collection, 
      onSnapshot, 
      doc, 
      setDoc, 
      deleteDoc 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAElv1iaPxHPiWqDXkSOsZBw86S4WCPov4",
      authDomain: "is-asistanim.firebaseapp.com",
      projectId: "is-asistanim",
      storageBucket: "is-asistanim.firebasestorage.app",
      messagingSenderId: "385268930352",
      appId: "1:385268930352:web:78f65dc5e09622a657daf5",
      measurementId: "G-X1VVE26CE9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.dbFuncs = { collection, onSnapshot, doc, setDoc, deleteDoc };
  </script>
</head>
<body class="bg-gradient-to-br from-slate-100 via-slate-50 to-blue-50/30 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950 text-slate-800 dark:text-slate-100 font-sans antialiased min-h-screen">
  <div id="root"></div>

  <script>
    const e = React.createElement;
    const { useState, useEffect, useRef } = React;

    function App() {
      const todayISO = new Date().toISOString().split("T")[0];

      const [darkMode, setDarkMode] = useState(false);
      const [activeTab, setActiveTab] = useState("daily");
      const [selectedDate, setSelectedDate] = useState(todayISO);

      // Ref'ler
      const taskFileInputRef = useRef(null);
      const [selectedTaskImage, setSelectedTaskImage] = useState(null);

      const meetingFileInputRef = useRef(null);
      const [selectedMeetingImage, setSelectedMeetingImage] = useState(null);

      // State'ler
      const [tasks, setTasks] = useState([]);
      const [meetingTopics, setMeetingTopics] = useState([]);

      const [showAddForm, setShowAddForm] = useState(false);
      const [newTaskTitle, setNewTaskTitle] = useState("");
      const [newTaskPriority, setNewTaskPriority] = useState("Yüksek");
      const [newTaskCategory, setNewTaskCategory] = useState("Üretim");

      // Toplantı Formu State'leri
      const [newMeetingTitle, setNewMeetingTitle] = useState("");
      const [selectedTopicId, setSelectedTopicId] = useState(null);
      const [newNoteContent, setNewNoteContent] = useState("");
      const [newNoteAssignee, setNewNoteAssignee] = useState("");

      const [searchQuery, setSearchQuery] = useState("");
      const [isListeningTask, setIsListeningTask] = useState(false);
      const [isListeningNote, setIsListeningNote] = useState(false);
      const [isSyncing, setIsSyncing] = useState(true);

      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      // Firebase Dinleyici
      useEffect(() => {
        const checkDb = setInterval(() => {
          if (window.db && window.dbFuncs) {
            clearInterval(checkDb);
            const { collection, onSnapshot } = window.dbFuncs;

            const unsubTasks = onSnapshot(collection(window.db, "tasks"), (snapshot) => {
              const loadedTasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              
              // OTOMATİK DEVİR MANTIĞI (Günü geçen ve tamamlanmayanları bugüne taşı)
              const updatedTasks = loadedTasks.map(task => {
                if (!task.completed && task.date < todayISO) {
                  const rolledTask = { ...task, date: todayISO, isRollover: true };
                  saveTaskToFirebase(rolledTask); // Veritabanını güncelle
                  return rolledTask;
                }
                return task;
              });

              setTasks(updatedTasks);
              setIsSyncing(false);
            });

            const unsubTopics = onSnapshot(collection(window.db, "topics"), (snapshot) => {
              const loadedTopics = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              setMeetingTopics(loadedTopics);
            });

            return () => { unsubTasks(); unsubTopics(); };
          }
        }, 300);
        return () => clearInterval(checkDb);
      }, []);

      const saveTaskToFirebase = async (taskObj) => {
        if (!window.db) return;
        const { doc, setDoc } = window.dbFuncs;
        await setDoc(doc(window.db, "tasks", taskObj.id), taskObj);
      };

      const deleteTaskFromFirebase = async (id) => {
        if (!window.db) return;
        const { doc, deleteDoc } = window.dbFuncs;
        await deleteDoc(doc(window.db, "tasks", id));
      };

      const saveTopicToFirebase = async (topicObj) => {
        if (!window.db) return;
        const { doc, setDoc } = window.dbFuncs;
        await setDoc(doc(window.db, "topics", topicObj.id), topicObj);
      };

      const handleTaskImageSelect = (evt) => {
        const file = evt.target.files && evt.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => setSelectedTaskImage(reader.result);
          reader.readAsDataURL(file);
        }
      };

      const handleMeetingImageSelect = (evt) => {
        const file = evt.target.files && evt.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => setSelectedMeetingImage(reader.result);
          reader.readAsDataURL(file);
        }
      };

      // Sesle Canlı Dikte (Görev Ekleme)
      const toggleListeningTask = () => {
        if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
          alert("Tarayıcınız ses tanıma özelliğini desteklemiyor.");
          return;
        }
        if (isListeningTask) {
          setIsListeningTask(false);
        } else {
          setIsListeningTask(true);
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          const recognition = new SpeechRecognition();
          recognition.lang = "tr-TR";
          recognition.onresult = (event) => {
            setNewTaskTitle(event.results[0][0].transcript);
            setIsListeningTask(false);
            setShowAddForm(true);
          };
          recognition.onend = () => setIsListeningTask(false);
          recognition.start();
        }
      };

      // Sesle Canlı Dikte (Toplantı Notu Ekleme)
      const toggleListeningNote = () => {
        if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
          alert("Tarayıcınız ses tanıma özelliğini desteklemiyor.");
          return;
        }
        if (isListeningNote) {
          setIsListeningNote(false);
        } else {
          setIsListeningNote(true);
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          const recognition = new SpeechRecognition();
          recognition.lang = "tr-TR";
          recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            setNewNoteContent((prev) => (prev ? prev + " " + text : text));
            setIsListeningNote(false);
          };
          recognition.onend = () => setIsListeningNote(false);
          recognition.start();
        }
      };

      const addTask = (titleToUse) => {
        const title = titleToUse || newTaskTitle;
        if (!title.trim() && !selectedTaskImage) return;
        const newTask = {
          id: Date.now().toString(),
          title: title || "Görsel Not",
          date: selectedDate,
          completed: false,
          priority: newTaskPriority || "Yüksek",
          category: newTaskCategory || "Üretim",
          image: selectedTaskImage,
          isRollover: false
        };
        saveTaskToFirebase(newTask);
        setNewTaskTitle("");
        setSelectedTaskImage(null);
        setShowAddForm(false);
      };

      const toggleTask = (id) => {
        const existing = tasks.find(t => t.id === id);
        if (existing) saveTaskToFirebase({ ...existing, completed: !existing.completed });
      };

      const deleteTask = (id) => deleteTaskFromFirebase(id);

      // Toplantı Yönetimi
      const addMeetingTopic = () => {
        if (!newMeetingTitle.trim()) return;
        const newTopic = { 
          id: "m_" + Date.now(), 
          title: newMeetingTitle, 
          date: selectedDate,
          notes: [] 
        };
        saveTopicToFirebase(newTopic);
        setNewMeetingTitle("");
      };

      const addNoteToTopic = (topicId) => {
        if (!newNoteContent.trim() && !selectedMeetingImage) return;
        const existing = meetingTopics.find(top => top.id === topicId);
        if (existing) {
          const updated = {
            ...existing,
            notes: [{ 
              id: "n_" + Date.now(), 
              date: selectedDate, 
              content: newNoteContent,
              assignee: newNoteAssignee || "Belirtilmedi",
              image: selectedMeetingImage 
            }, ...(existing.notes || [])]
          };
          saveTopicToFirebase(updated);
        }
        setNewNoteContent("");
        setNewNoteAssignee("");
        setSelectedMeetingImage(null);
      };

      // Toplantı Tutanağı PDF
      const exportMeetingToPDF = (topic) => {
        const element = document.createElement("div");
        element.style.padding = "20px";
        element.style.fontFamily = "Arial, sans-serif";
        
        let notesHtml = (topic.notes || []).map((n, idx) => `
          <tr style="border-bottom: 1px solid #ddd;">
            <td style="padding: 10px; font-weight: bold; width: 30px;">${idx + 1}.</td>
            <td style="padding: 10px;">${n.content}</td>
            <td style="padding: 10px; font-weight: bold; color: #2563eb; width: 130px;">${n.assignee || 'Atanmadı'}</td>
            <td style="padding: 10px; color: #666; font-size: 11px; width: 90px;">${n.date}</td>
          </tr>
        `).join("");

        element.innerHTML = `
          <div style="border-bottom: 2px solid #1e3a8a; padding-bottom: 10px; margin-bottom: 20px;">
            <h1 style="color: #1e3a8a; margin: 0; font-size: 20px;">TOPLANTI SONUÇ TUTANAĞI</h1>
            <p style="margin: 5px 0 0 0; color: #555; font-size: 12px;"><strong>Toplantı Konusu:</strong> ${topic.title}</p>
            <p style="margin: 2px 0 0 0; color: #555; font-size: 12px;"><strong>Düzenleme Tarihi:</strong> ${topic.date || selectedDate}</p>
          </div>
          
          <h3 style="color: #333; font-size: 14px; margin-bottom: 10px;">Alınan Kararlar ve Sorumlu Listesi:</h3>
          <table style="width: 100%; border-collapse: collapse; font-size: 12px; text-align: left;">
            <thead>
              <tr style="background-color: #f1f5f9; border-bottom: 2px solid #cbd5e1;">
                <th style="padding: 8px;">#</th>
                <th style="padding: 8px;">Karar / Not Açıklaması</th>
                <th style="padding: 8px;">Sorumlu Kişi</th>
                <th style="padding: 8px;">Tarih</th>
              </tr>
            </thead>
            <tbody>
              ${notesHtml || '<tr><td colspan="4" style="padding:10px;">Karar kaydı yok.</td></tr>'}
            </tbody>
          </table>

          <div style="margin-top: 40px; font-size: 10px; color: #888; text-align: right; border-top: 1px solid #eee; pt: 10px;">
            İş Asistanım Pro - Dijital Toplantı Tutanak Sistemi
          </div>
        `;

        const opt = {
          margin:       0.5,
          filename:     `${topic.title}_Toplanti_Tutanagi.pdf`,
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2 },
          jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save();
      };

      // Gelişmiş Filtreleme ve Yüksek Öncelik Sıralaması
      const filteredTasks = tasks.filter(t => {
        const isDateMatch = t.date === selectedDate;
        const titleSafe = (t.title || "").toLowerCase();
        return isDateMatch && titleSafe.includes((searchQuery || "").toLowerCase());
      }).sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1; // Tamamlananlar en alta
        if (a.isRollover !== b.isRollover) return a.isRollover ? -1 : 1; // Devredenler en üste
        if (a.priority === "Yüksek" && b.priority !== "Yüksek") return -1; // Yüksek öncelik üste
        if (a.priority !== "Yüksek" && b.priority === "Yüksek") return 1;
        return 0;
      });

      const completedCount = filteredTasks.filter(t => t.completed).length;
      const progressPercent = filteredTasks.length > 0 ? Math.round((completedCount / filteredTasks.length) * 100) : 0;

      // Tarih Şeridi
      const calendarDays = (() => {
        const days = [];
        const base = new Date();
        for (let i = -3; i <= 7; i++) {
          const d = new Date(base);
          d.setDate(base.getDate() + i);
          days.push({ 
            iso: d.toISOString().split("T")[0], 
            dayName: d.toLocaleDateString("tr-TR", { weekday: "short" }), 
            dayNum: d.getDate() 
          });
        }
        return days;
      })();

      // Seçili Tarihin Gün İsmi İle Formatlanması
      const formattedSelectedDate = (() => {
        const [y, m, d] = selectedDate.split("-");
        const dateObj = new Date(y, m - 1, d);
        return dateObj.toLocaleDateString("tr-TR", { day: "numeric", month: "long", year: "numeric", weekday: "long" });
      })();

      const renderTaskCard = (task) => e("div", { 
        key: task.id, 
        className: `p-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md rounded-2xl border ${task.priority === "Yüksek" ? "border-amber-500/50 dark:border-amber-500/40 shadow-amber-500/5" : "border-slate-200/80 dark:border-slate-800"} shadow-xs flex items-center justify-between gap-3` 
      },
        e("div", { className: "flex items-start gap-3 flex-1" },
          e("button", {
            onClick: () => toggleTask(task.id),
            className: `w-5 h-5 mt-0.5 rounded-lg border flex items-center justify-center transition-all ${task.completed ? "bg-blue-600 border-blue-600 text-white" : "border-slate-300 dark:border-slate-600"}`
          }, task.completed ? "✓" : ""),
          e("div", { className: "space-y-1" },
            e("div", { className: "flex items-center gap-1.5 flex-wrap" },
              task.isRollover && e("span", { className: "px-2 py-0.5 bg-rose-100 dark:bg-rose-950/80 text-rose-600 dark:text-rose-400 font-black text-[9px] rounded-md border border-rose-200 dark:border-rose-800" }, "🔄 Dünün Devri"),
              task.priority === "Yüksek" && e("span", { className: "px-2 py-0.5 bg-amber-100 dark:bg-amber-950/80 text-amber-700 dark:text-amber-400 font-black text-[9px] rounded-md border border-amber-200 dark:border-amber-800" }, "🔥 Yüksek Öncelik")
            ),
            e("p", { className: `text-xs font-semibold ${task.completed ? "line-through text-slate-400" : "text-slate-800 dark:text-slate-100"}` }, task.title)
          )
        ),
        e("button", { onClick: () => deleteTask(task.id), className: "text-slate-400 hover:text-red-600 text-xs p-1" }, "🗑️")
      );

      return e("div", { className: "max-w-md mx-auto min-h-screen flex flex-col pb-12" },
        e("input", { type: "file", accept: "image/*", ref: taskFileInputRef, onChange: handleTaskImageSelect, className: "hidden" }),
        e("input", { type: "file", accept: "image/*", ref: meetingFileInputRef, onChange: handleMeetingImageSelect, className: "hidden" }),

        // Header
        e("header", { className: "p-4 flex items-center justify-between backdrop-blur-xl bg-white/80 dark:bg-slate-900/80 sticky top-0 z-30 border-b border-slate-200/50 dark:border-slate-800/80 shadow-xs" },
          e("div", { className: "flex items-center gap-2.5" },
            e("div", { className: "w-9 h-9 rounded-2xl bg-gradient-to-tr from-blue-600 to-indigo-500 flex items-center justify-center text-white font-black text-base shadow-md shadow-blue-500/20" }, "⚡"),
            e("div", null,
              e("h1", { className: "font-black text-sm tracking-tight text-slate-900 dark:text-white" }, "İş Asistanım PRO"),
              e("div", { className: "flex items-center gap-1.5 mt-0.5" },
                e("span", { className: `w-1.5 h-1.5 rounded-full ${isSyncing ? "bg-amber-400 animate-pulse" : "bg-emerald-500"}` }),
                e("span", { className: "text-[10px] font-bold text-slate-400" }, isSyncing ? "Eşitleniyor..." : "Bulut Aktif")
              )
            )
          ),
          e("button", { onClick: () => setDarkMode(!darkMode), className: "p-2.5 rounded-2xl bg-slate-100 dark:bg-slate-800 text-xs" }, darkMode ? "☀️" : "🌙")
        ),

        e("main", { className: "p-4 space-y-4" },
          
          // Arama & Sekme Seçici
          e("div", { className: "space-y-3" },
            e("div", { className: "relative" },
              e("input", {
                type: "text",
                placeholder: activeTab === "daily" ? "Görevlerde ara..." : "Toplantı notlarında ara...",
                value: searchQuery,
                onChange: (ev) => setSearchQuery(ev.target.value),
                className: "w-full pl-9 pr-4 py-2.5 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border border-slate-200/80 dark:border-slate-800 rounded-2xl text-xs font-medium focus:outline-none focus:ring-2 focus:ring-blue-500"
              }),
              e("span", { className: "absolute left-3 top-2.5 text-slate-400 text-xs" }, "🔍")
            ),

            e("div", { className: "flex bg-slate-200/60 dark:bg-slate-800/60 backdrop-blur-md p-1 rounded-2xl gap-1" },
              e("button", {
                onClick: () => setActiveTab("daily"),
                className: `flex-1 py-2.5 text-xs font-extrabold rounded-xl transition-all ${activeTab === "daily" ? "bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm" : "text-slate-500"}`
              }, "☑️ Günlük Görevler"),
              e("button", {
                onClick: () => setActiveTab("meetings"),
                className: `flex-1 py-2.5 text-xs font-extrabold rounded-xl transition-all ${activeTab === "meetings" ? "bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm" : "text-slate-500"}`
              }, "🤝 Toplantı Notları")
            )
          ),

          /* 1. SEKME: GÜNLÜK GÖREVLER */
          activeTab === "daily" && e("div", { className: "space-y-4" },
            
            // Tarih Şeridi (GÜN İSMİ DAHİL)
            e("section", { className: "bg-white/70 dark:bg-slate-900/70 backdrop-blur-md p-3.5 rounded-3xl border border-slate-200/80 dark:border-slate-800 space-y-2.5" },
              e("div", { className: "flex items-center justify-between px-1" },
                e("span", { className: "text-xs font-black text-blue-600 dark:text-blue-400 capitalize" }, `📅 ${formattedSelectedDate}`),
                e("input", { type: "date", value: selectedDate, onChange: (ev) => setSelectedDate(ev.target.value), className: "text-xs bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded-xl outline-none" })
              ),
              e("div", { className: "flex gap-2 overflow-x-auto pb-0.5 scrollbar-none" },
                calendarDays.map((d) => e("button", {
                  key: d.iso,
                  onClick: () => setSelectedDate(d.iso),
                  className: `flex-shrink-0 w-12 py-2.5 rounded-2xl flex flex-col items-center justify-center ${d.iso === selectedDate ? "bg-blue-600 text-white shadow-md shadow-blue-500/20" : "bg-slate-100/80 dark:bg-slate-800/50 text-slate-600 dark:text-slate-400"}`
                },
                  e("span", { className: "text-[10px] font-bold" }, d.dayName),
                  e("span", { className: "text-xs font-black mt-0.5" }, d.dayNum)
                ))
              )
            ),

            // Performans Kartı
            e("div", { className: "bg-gradient-to-r from-slate-900 to-blue-950 text-white rounded-3xl p-4 shadow-xl flex items-center justify-between" },
              e("div", { className: "space-y-1" },
                e("span", { className: "text-[10px] font-extrabold text-blue-400 uppercase tracking-wider" }, "Günlük Tamamlanma"),
                e("h3", { className: "text-base font-black" }, `${completedCount} / ${filteredTasks.length} Görev Tamam`),
                e("p", { className: "text-[11px] text-slate-300" }, "Devreden görevler en üste sabitlendi.")
              ),
              e("div", { className: "relative w-14 h-14 flex items-center justify-center font-black text-xs bg-white/10 rounded-2xl border border-white/10" }, `%${progressPercent}`)
            ),

            // Aksiyon Butonları
            e("div", { className: "grid grid-cols-3 gap-2" },
              e("button", { onClick: () => setShowAddForm(!showAddForm), className: "py-3 bg-blue-600 text-white rounded-2xl font-extrabold text-xs shadow-md" }, showAddForm ? "✖️ Kapat" : "➕ Yeni Görev"),
              e("button", { onClick: toggleListeningTask, className: `py-3 border rounded-2xl font-extrabold text-xs ${isListeningTask ? "bg-rose-500 text-white animate-pulse" : "bg-white/80 dark:bg-slate-900/80 text-slate-700 dark:text-slate-200"}` }, isListeningTask ? "🎙️ Dinliyor..." : "🎙️ Sesle Ekle"),
              e("button", { onClick: () => taskFileInputRef.current && taskFileInputRef.current.click(), className: "py-3 bg-white/80 dark:bg-slate-900/80 border rounded-2xl text-slate-700 dark:text-slate-200 font-extrabold text-xs" }, "📷 Resim")
            ),

            showAddForm && e("section", { className: "bg-white/80 dark:bg-slate-900/80 p-4 rounded-3xl border space-y-3 shadow-sm" },
              e("textarea", { rows: "2", placeholder: "Görev tanımını yazın...", value: newTaskTitle, onChange: (ev) => setNewTaskTitle(ev.target.value), className: "w-full p-3 bg-slate-50 dark:bg-slate-800 border rounded-2xl text-xs outline-none focus:ring-2 focus:ring-blue-500" }),
              
              e("div", { className: "flex gap-2" },
                e("select", {
                  value: newTaskPriority,
                  onChange: (ev) => setNewTaskPriority(ev.target.value),
                  className: "flex-1 p-2 bg-slate-50 dark:bg-slate-800 border rounded-xl text-xs font-bold"
                },
                  e("option", { value: "Yüksek" }, "🔥 Yüksek Öncelik"),
                  e("option", { value: "Orta" }, "⚡ Orta Öncelik"),
                  e("option", { value: "Düşük" }, "☕ Düşük Öncelik")
                ),
                e("button", { onClick: () => addTask(), className: "px-5 py-2 bg-blue-600 text-white rounded-xl text-xs font-black shadow-md" }, "Kaydet")
              )
            ),

            filteredTasks.length === 0 
              ? e("p", { className: "text-center text-xs text-slate-400 py-6" }, "Bu tarihe ait görev bulunmuyor.")
              : filteredTasks.map(task => renderTaskCard(task))
          ),

          /* 2. SEKME: TOPLANTI NOTLARI */
          activeTab === "meetings" && e("div", { className: "space-y-4" },
            
            // Yeni Toplantı Başlatma
            e("section", { className: "bg-white/80 dark:bg-slate-900/80 backdrop-blur-md p-4 rounded-3xl border border-slate-200 dark:border-slate-800 space-y-2.5 shadow-xs" },
              e("h3", { className: "text-xs font-black text-slate-800 dark:text-slate-100 flex items-center gap-1.5" }, "🤝 Yeni Toplantı Kaydı Başlat"),
              e("div", { className: "flex gap-2" },
                e("input", {
                  type: "text",
                  placeholder: "Toplantı Konusu (Örn: İmalat Kalite ve FSW Raporu)",
                  value: newMeetingTitle,
                  onChange: (ev) => setNewMeetingTitle(ev.target.value),
                  className: "flex-1 px-3.5 py-2.5 bg-slate-50 dark:bg-slate-800 border rounded-2xl text-xs font-medium outline-none focus:ring-2 focus:ring-blue-500"
                }),
                e("button", { onClick: addMeetingTopic, className: "px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl text-xs font-black shadow-md" }, "Başlat")
              )
            ),

            // Toplantı Listesi
            e("div", { className: "space-y-3" },
              meetingTopics.filter(top => (top.title || "").toLowerCase().includes(searchQuery.toLowerCase())).map((topic) => {
                const isExpanded = selectedTopicId === topic.id;
                const notesList = topic.notes || [];

                return e("div", { key: topic.id, className: "bg-white/80 dark:bg-slate-900/80 backdrop-blur-md rounded-3xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-xs" },
                  
                  // Kart Başlığı & PDF
                  e("div", { className: "p-4 flex items-center justify-between" },
                    e("div", { 
                      onClick: () => setSelectedTopicId(isExpanded ? null : topic.id),
                      className: "flex items-center gap-3 cursor-pointer flex-1"
                    },
                      e("div", { className: "w-9 h-9 rounded-2xl bg-indigo-50 dark:bg-slate-800 flex items-center justify-center text-base" }, "🤝"),
                      e("div", null,
                        e("h4", { className: "font-bold text-xs text-slate-800 dark:text-slate-100" }, topic.title),
                        e("p", { className: "text-[10px] text-slate-400 font-medium mt-0.5" }, `Tarih: ${topic.date || selectedDate} • ${notesList.length} Karar / Not`)
                      )
                    ),

                    e("button", {
                      onClick: () => exportMeetingToPDF(topic),
                      className: "px-3 py-1.5 bg-indigo-50 dark:bg-indigo-950/50 hover:bg-indigo-100 text-indigo-600 dark:text-indigo-300 border border-indigo-200 dark:border-indigo-800 rounded-xl text-[11px] font-bold flex items-center gap-1 shadow-2xs"
                    }, "📄 PDF Tutanak")
                  ),

                  // Detay & Konuşarak Not Ekleme Formu
                  isExpanded && e("div", { className: "p-4 pt-0 border-t border-slate-100 dark:border-slate-800 space-y-4 bg-slate-50/30 dark:bg-slate-900/30" },
                    
                    e("div", { className: "mt-3 space-y-2.5 p-3.5 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700" },
                      e("label", { className: "text-[10px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-wider block" }, "✍️ Karar / Not Gir & Sorumlu Ata"),
                      
                      e("textarea", {
                        rows: "2",
                        placeholder: "Karar maddesini yazın veya '🎙️ Sesli Konuş'a basarak söyleyin...",
                        value: newNoteContent,
                        onChange: (ev) => setNewNoteContent(ev.target.value),
                        className: "w-full p-2.5 bg-slate-50 dark:bg-slate-900 border rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-500"
                      }),

                      e("input", {
                        type: "text",
                        placeholder: "Sorumlu Kişi / Ekip (Örn: Ahmet B.)",
                        value: newNoteAssignee,
                        onChange: (ev) => setNewNoteAssignee(ev.target.value),
                        className: "w-full p-2 bg-slate-50 dark:bg-slate-900 border rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-500"
                      }),

                      selectedMeetingImage && e("div", { className: "relative w-16 h-16" },
                        e("img", { src: selectedMeetingImage, className: "w-full h-full object-cover rounded-xl border" }),
                        e("button", { onClick: () => setSelectedMeetingImage(null), className: "absolute -top-2 -right-2 bg-rose-500 text-white w-4 h-4 rounded-full text-[9px]" }, "✕")
                      ),

                      // Dikte & Görsel Araçları
                      e("div", { className: "flex items-center justify-between gap-2 pt-1" },
                        e("div", { className: "flex items-center gap-1.5" },
                          e("button", {
                            onClick: toggleListeningNote,
                            className: `px-2.5 py-1.5 rounded-xl border text-[11px] font-bold ${isListeningNote ? "bg-rose-500 text-white animate-pulse" : "bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200"}`
                          }, isListeningNote ? "🎙️ Dinliyor..." : "🎙️ Sesli Konuş"),
                          
                          e("button", {
                            onClick: () => meetingFileInputRef.current && meetingFileInputRef.current.click(),
                            className: "px-2.5 py-1.5 bg-slate-100 dark:bg-slate-700 border text-slate-700 dark:text-slate-200 rounded-xl text-[11px] font-bold"
                          }, "📷 Resim")
                        ),

                        e("button", { 
                          onClick: () => addNoteToTopic(topic.id), 
                          className: "px-4 py-1.5 bg-indigo-600 text-white rounded-xl text-xs font-black shadow-md" 
                        }, "Kararı Kaydet")
                      )
                    ),

                    // Kararlar Listesi
                    e("div", { className: "space-y-2 pt-1" },
                      notesList.length === 0 
                        ? e("p", { className: "text-center text-[11px] text-slate-400 py-2" }, "Henüz karar maddesi eklenmedi.")
                        : notesList.map((note, index) => e("div", { key: note.id, className: "p-3 bg-white dark:bg-slate-800 rounded-2xl border space-y-1.5 shadow-2xs" },
                          e("div", { className: "flex justify-between items-center" },
                            e("span", { className: "text-[10px] font-bold text-slate-400" }, `Madde #${index + 1}`),
                            e("div", { className: "flex items-center gap-2" },
                              e("span", { className: "text-[10px] font-bold text-indigo-600 bg-indigo-50 dark:bg-indigo-950 px-2 py-0.5 rounded-lg border border-indigo-200 dark:border-indigo-800" }, `👤 ${note.assignee || 'Atanmadı'}`),
                              e("button", {
                                onClick: () => {
                                  addTask(`[${topic.title}] ${note.content} (Sorumlu: ${note.assignee || 'Belirtilmedi'})`);
                                  alert("Karar maddesi Günlük Görevler listesine aktarıldı!");
                                },
                                className: "text-[10px] text-blue-600 font-bold hover:underline"
                              }, "➡️ Göreve Dönüştür")
                            )
                          ),
                          e("p", { className: "text-xs text-slate-800 dark:text-slate-100 font-medium" }, note.content),
                          note.image && e("img", { src: note.image, className: "max-h-36 w-full object-cover rounded-xl border mt-2" })
                        ))
                    )
                  )
                );
              })
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(e(App));
  </script>
</body>
</html>
